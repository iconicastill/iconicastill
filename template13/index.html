<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Page</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>
<body class="bg-light">
  
<div class="container my-5">

  <header class="text-center py-4">
    <h1>My Website</h1>
    <p>Welcome to my simple website</p>
    <a href="/portafolio.html">Portafolio</a>
  </header>

  <main>

    <h2>About</h2>
      
    <p>This is a very simple page.</p>

      <button id="botonFabuloso" class="btn shadow-lg fw-bold text-uppercase">
        ✨ ¡Lanzar Arcoíris! ✨
      </button>

    <div class="container mt-5">
      <div class="row">
        <!-- Columna 1 -->
        <div class="col-md-4 mb-3">
          <div class="p-3 bg-primary text-white rounded">
            <h3>Paso 1</h3>
            <p>En el celular ocupo todo el ancho.</p>
          </div>
        </div>
        <!-- Columna 2 -->
        <div class="col-md-4 mb-3">
          <div class="p-3 bg-success text-white rounded">
            <h3>Paso 2</h3>
            <p>En la PC me pongo al centro.</p>
          </div>
        </div>
        <!-- Columna 3 -->
        <div class="col-md-4 mb-3">
          <div class="p-3 bg-danger text-white rounded">
            <h3>Paso 3</h3>
            <p>Bootstrap suma 12 columnas en total.</p>
          </div>
        </div>
      </div>
    </div>

  </main>

  <footer>
   <p class="creditos">© Copyright 2022 @iconicastill</p>
  </footer>

</div> <!-- Cierre del container -->

      <!-- Bootstrap JS -->
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

      <!-- Librería Confetti -->
      <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

      <!-- Tu código personalizado -->
      <script>
        const btn = document.querySelector('#botonFabuloso');
        
        btn.addEventListener('click', () => {
          confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#ff0000', '#ffa500', '#ffff00', '#008000', '#0000ff', '#4b0082', '#ee82ee']
          });
        });
      </script>

</body>
</html>
